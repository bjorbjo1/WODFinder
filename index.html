<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WOD">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>WOD Finder</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --muted: #888;
  --green: #4ecca3;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  overflow-x: hidden;
}
.screen { display:none; flex-direction:column; min-height:calc(100vh - var(--safe-top)); padding:20px; }
.screen.active { display:flex; }

/* Start screen */
#start { justify-content:center; align-items:center; gap:24px; }
#start h1 { font-size:2.8em; letter-spacing:3px; color:var(--accent); }
#start p { color:var(--muted); font-size:0.95em; }
.start-grid { display:flex; flex-direction:column; gap:14px; width:100%; max-width:340px; }
.start-btn {
  background:var(--card); border:2px solid var(--accent2); color:var(--text);
  font-size:1.2em; padding:22px 20px; border-radius:16px; cursor:pointer;
  display:flex; align-items:center; gap:14px; transition:all .15s;
}
.start-btn:active { background:var(--accent2); transform:scale(0.97); }
.start-btn svg { flex-shrink:0; }
.start-btn-sub { font-size:0.65em; color:var(--muted); display:block; font-weight:400; }

/* Builder screen */
#builder { align-items:center; justify-content:center; gap:16px; }
.builder-section { width:100%; max-width:380px; display:none; }
.builder-section.visible { display:block; }
.builder-step-title {
  font-size:1.5em; font-weight:700; color:var(--text); text-align:center; margin-bottom:16px;
}
.builder-step-num {
  font-size:0.75em; color:var(--accent); text-transform:uppercase; letter-spacing:2px;
  text-align:center; display:block; margin-bottom:6px;
}
.pill-grid { display:flex; flex-direction:column; gap:12px; width:100%; }
.pill-grid-2col { flex-direction:row; flex-wrap:wrap; }
.pill-grid-2col .pill { width:calc(50% - 6px); flex:none; font-size:1.05em; padding:16px 14px; }
.pill {
  background: var(--card); border:2px solid var(--accent2); color:var(--text);
  font-size:1.2em; padding:18px 22px; border-radius:16px; cursor:pointer;
  display:flex; align-items:center; gap:14px; transition:all .15s; width:100%;
}
.pill:active { transform:scale(0.97); }
.pill.selected { border-color:var(--green); background:rgba(78,204,163,0.12); color:var(--green); }
.pill svg { flex-shrink:0; }
.divider { color:var(--muted); text-align:center; font-size:0.85em; margin:4px 0; }
.generate-btn {
  width:100%; max-width:380px; padding:16px; border:none; border-radius:14px;
  font-size:1.15em; font-weight:700; cursor:pointer; transition:all .15s;
  background:var(--accent2); color:var(--muted);
}
.generate-btn.ready { background:var(--green); color:#111; }
.generate-btn:active { transform:scale(0.97); }

/* Star rating */
.star-rating { display:inline-flex; gap:2px; margin-top:4px; }
.star-btn {
  background:none; border:none; font-size:1.2em; cursor:pointer; padding:2px;
  color:var(--accent2); transition:color .1s;
}
.star-btn.filled { color:#f5a623; }
.star-btn:active { transform:scale(1.2); }

/* WOD screen */
#wod { gap:14px; }
#wod h2 { color:var(--accent); font-size:1.4em; text-align:center; }
.wod-type-label { text-align:center; color:var(--muted); font-size:0.85em; text-transform:uppercase; letter-spacing:1px; }
.wod-card {
  background:var(--card); border-radius:14px; padding:16px; margin-top:4px;
}
.wod-name { font-size:1.1em; font-weight:700; color:var(--green); margin-bottom:8px; }
.wod-format { font-size:0.85em; color:var(--muted); margin-bottom:10px; }
.exercise-row {
  display:flex; align-items:center; gap:8px; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.exercise-row:last-child { border-bottom:none; }
.exercise-text { flex:1; font-size:0.95em; }
.exercise-actions { display:flex; gap:6px; }
.ex-btn {
  background:var(--accent2); border:none; color:var(--text); width:32px; height:32px;
  border-radius:8px; font-size:0.85em; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.ex-btn:active { opacity:0.7; }
/* Exercise info panel */
.ex-info {
  display:none; padding:8px 10px; margin:-2px 0 4px; background:rgba(15,52,96,0.4);
  border-radius:8px; font-size:0.85em; color:var(--muted); line-height:1.4;
}
.ex-info.open { display:block; }
.ex-info-link {
  display:inline-flex; align-items:center; gap:4px; color:var(--green);
  text-decoration:none; font-size:0.85em; margin-top:4px;
}
.ex-info-link:active { opacity:0.7; }
.ex-btn-info { background:transparent; border:1px solid var(--accent2); font-size:0.75em; }
.btn-row { display:flex; gap:10px; padding-top:14px; }
.btn {
  flex:1; padding:15px; border:none; border-radius:12px; font-size:1em;
  font-weight:600; cursor:pointer; transition:all .15s;
}
.btn:active { transform:scale(0.97); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-outline { background:transparent; border:2px solid var(--accent2); color:var(--text); }
.btn-green { background:var(--green); color:#111; }
.btn-small { padding:10px 14px; font-size:0.9em; }
/* Back button - top left */
.back-bar { width:100%; display:flex; align-items:center; margin-bottom:8px; padding-top:10px; }
.back-btn {
  background:var(--accent2); border:none; color:var(--text); font-size:1em;
  font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px;
  padding:10px 16px; border-radius:10px; transition:all .15s;
}
.back-btn:active { background:var(--accent); transform:scale(0.97); }
.back-btn svg { flex-shrink:0; }

/* Timer screen */
#timer { justify-content:flex-start; align-items:center; gap:10px; position:relative; }
.timer-spacer { flex:1; }
.timer-display {
  font-size:min(18vw, 22vh); font-weight:700; font-variant-numeric:tabular-nums;
  color:var(--text); text-align:center; line-height:1;
}
.timer-phase { font-size:1.2em; color:var(--green); text-align:center; }
.timer-round { color:var(--muted); font-size:1em; text-align:center; }
.timer-controls-wrapper {
  width:100%; padding:16px 0; padding-bottom:calc(16px + var(--safe-bottom));
  display:flex; justify-content:center;
}
.timer-controls { display:flex; gap:12px; }
.timer-controls .btn { flex:none; }
.timer-btn-pause { background:var(--accent2); color:var(--text); border:2px solid rgba(255,255,255,0.15); }
.timer-btn-stop { background:transparent; color:var(--muted); border:2px solid var(--accent2); }
.timer-ex-controls { display:none; gap:12px; }
.timer-ex-controls.has-exercises { display:flex; }
.landscape-top-bar { display:none; }
/* Exercise tracker on timer */
.timer-exercise-tracker { width:100%; max-width:380px; text-align:center; }
.timer-ex-current {
  font-size:1.8em; font-weight:700; color:var(--text); padding:12px 8px;
  background:var(--accent2); border-radius:12px; margin-bottom:6px;
}
.timer-ex-done {
  font-size:1em; color:var(--muted); padding:4px 0;
  text-decoration:line-through; opacity:0.5;
}
.timer-ex-next {
  font-size:1.15em; color:var(--muted); padding:4px 0;
}
.timer-ex-next-label { font-size:0.85em; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-top:6px; }
.timer-ex-finished { font-size:1.8em; font-weight:700; color:var(--green); padding:12px 0; }

/* Landscape timer — clock left, exercises right, all centered */
@media (orientation: landscape) {
  #timer {
    display:grid !important; min-height:100vh; padding:8px;
    grid-template-columns: 1fr 35vw;
    grid-template-rows: 1fr auto auto auto 1fr;
    gap:0 10px;
    align-items:center;
  }
  #timer .landscape-top-bar { display:none !important; }
  #timer .timer-spacer { display:none; }
  /* Clock area — left column, centered via surrounding 1fr rows */
  #timer .timer-phase { grid-column:1; grid-row:2; font-size:min(3vw, 4vh); text-align:center; padding-bottom:2px; }
  #timer .timer-display { grid-column:1; grid-row:3; font-size:min(20vw, 30vh); line-height:1; text-align:center; }
  #timer .timer-round { grid-column:1; grid-row:4; font-size:min(2vw, 3vh); text-align:center; padding-top:2px; }
  /* Pause/Stop — left column, under round, compact */
  #timer .timer-controls-wrapper {
    grid-column:1; grid-row:4; display:flex; justify-content:center;
    margin-top:0; padding-top:min(3vh, 20px); align-self:end;
  }
  #timer .timer-controls { gap:10px; }
  #timer .timer-controls .btn { padding:8px 22px; font-size:min(2.5vw, 3vh); flex:none; }
  /* Exercises — right column, centered via surrounding 1fr rows */
  #timer .timer-exercise-tracker {
    grid-column:2; grid-row:2 / 4; align-self:end;
    max-width:none; width:100%;
  }
  #timer .timer-exercise-tracker .timer-ex-current { font-size:min(4.5vw, 6vh); padding:10px 12px; }
  #timer .timer-exercise-tracker .timer-ex-done { font-size:min(2.5vw, 3vh); }
  #timer .timer-exercise-tracker .timer-ex-next { font-size:min(3.2vw, 4vh); }
  #timer .timer-exercise-tracker .timer-ex-next-label { font-size:min(2vw, 2.5vh); }
  #timer .timer-exercise-tracker .timer-ex-finished { font-size:min(4.5vw, 6vh); }
  /* Next/Back — right column, tight under exercises */
  #timer .timer-ex-controls,
  #timer .timer-ex-controls.has-exercises {
    display:flex !important; grid-column:2; grid-row:4; justify-content:center; gap:10px; align-self:start; padding-top:6px;
  }
  #timer .timer-ex-controls .btn { padding:8px 22px; font-size:min(2.5vw, 3vh); flex:none; }
}

/* Exercise equipment tag */
.exercise-equip {
  font-size:0.7em; color:var(--accent); background:rgba(233,69,96,0.15);
  padding:2px 6px; border-radius:5px; margin-left:6px; white-space:nowrap;
}
/* Add exercise button */
.add-exercise-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:10px; margin-top:6px; background:transparent;
  border:1px dashed var(--accent2); color:var(--muted); border-radius:10px;
  font-size:0.9em; cursor:pointer;
}
.add-exercise-btn:active { background:var(--accent2); color:var(--text); }
/* Difficulty buttons */
.difficulty-row { display:flex; gap:8px; margin-top:4px; }
.diff-btn {
  flex:1; padding:10px; border:1px solid var(--accent2); background:transparent;
  color:var(--text); border-radius:10px; font-size:0.85em; cursor:pointer; text-align:center;
}
.diff-btn:active { background:var(--accent2); }
/* Time cap adjuster */
.time-cap-row {
  display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px;
}
.time-cap-row span { color:var(--muted); font-size:0.9em; }
.time-cap-val { font-size:1.1em; font-weight:700; color:var(--green); min-width:50px; text-align:center; }
.time-cap-btn {
  background:var(--accent2); border:none; color:var(--text); width:36px; height:36px;
  border-radius:10px; font-size:1.2em; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.time-cap-btn:active { opacity:0.7; }

/* Edit modal */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:100; justify-content:center; align-items:flex-end;
}
.modal-overlay.active { display:flex; }
.modal {
  background:var(--card); border-radius:18px 18px 0 0; padding:24px 20px;
  padding-bottom:calc(20px + var(--safe-bottom)); width:100%; max-width:400px;
  max-height:70vh; overflow-y:auto;
}
.modal h3 { margin-bottom:14px; color:var(--accent); }
.modal input, .modal select {
  width:100%; padding:12px; background:var(--bg); border:1px solid var(--accent2);
  color:var(--text); border-radius:10px; font-size:1em; margin-bottom:10px;
  -webkit-appearance:none;
}
.modal .btn { margin-top:6px; }

/* History screen */
#history { gap:14px; }
#history h2 { color:var(--accent); font-size:1.4em; text-align:center; }
.history-empty { text-align:center; color:var(--muted); margin-top:40px; }
.history-item {
  background:var(--card); border-radius:12px; padding:14px; cursor:pointer;
  transition:all .15s;
}
.history-item:active { transform:scale(0.98); }
.history-date { font-size:0.8em; color:var(--muted); }
.history-wod-name { font-size:1em; font-weight:600; color:var(--green); margin:4px 0; }
.history-type { font-size:0.8em; color:var(--accent); text-transform:uppercase; letter-spacing:1px; }
.history-exercises { font-size:0.85em; color:var(--muted); margin-top:6px; }
.history-delete {
  float:right; background:var(--accent); border:none; color:#fff; width:28px; height:28px;
  border-radius:8px; font-size:0.85em; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.history-delete:active { opacity:0.7; }
/* Report screen */
#report { gap:14px; }
#report h2 { color:var(--green); font-size:1.4em; text-align:center; }
.report-total { text-align:center; font-size:1.6em; font-weight:700; color:var(--accent); }
.report-row {
  display:flex; justify-content:space-between; align-items:center; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.report-row:last-child { border-bottom:none; }
.report-ex { flex:1; font-size:0.95em; }
.report-time { font-weight:700; font-variant-numeric:tabular-nums; color:var(--green); min-width:60px; text-align:right; }
.report-bar-bg { height:6px; background:var(--accent2); border-radius:3px; margin-top:4px; }
.report-bar { height:6px; background:var(--green); border-radius:3px; }
.history-report-toggle {
  font-size:0.8em; color:var(--green); background:none; border:1px solid var(--green);
  padding:3px 8px; border-radius:6px; cursor:pointer; margin-top:4px;
}
.history-report { font-size:0.8em; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start" class="screen active">
  <h1>WOD</h1>
  <p>Workout of the Day</p>
  <div class="start-grid">
    <button class="start-btn" onclick="startBuilder()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
      <div>New Workout<span class="start-btn-sub">Choose focus, theme &amp; format</span></div>
    </button>
    <button class="start-btn" onclick="showHistory()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/><path d="M3.05 11a9 9 0 0117.9 0"/></svg>
      <div>Redo<span class="start-btn-sub">Repeat &amp; rate past workouts</span></div>
    </button>
    <button class="start-btn" onclick="surpriseMe()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2.2"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16l-6.4 5.2 2.4-7.2-6-4.8h7.6z"/></svg>
      <div>Surprise Me<span class="start-btn-sub">Totally random workout</span></div>
    </button>
  </div>
</div>

<!-- BUILDER SCREEN -->
<div id="builder" class="screen">
  <div class="back-bar"><button class="back-btn" id="builder-back-btn" onclick="builderBack()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>Back</button></div>

  <!-- Step 1: Focus -->
  <div class="builder-section" id="step-focus">
    <span class="builder-step-num">Step 1 of 4</span>
    <div class="builder-step-title">Body Focus</div>
    <div class="pill-grid" id="focus-pills">
      <button class="pill" onclick="selectPill('focus','any')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16l-6.4 5.2 2.4-7.2-6-4.8h7.6z"/></svg>Any</button>
      <button class="pill" onclick="selectPill('focus','upper')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v8M8 6l4 4 4-4M4 16l4-4M20 16l-4-4"/></svg>Arms &amp; Shoulders</button>
      <button class="pill" onclick="selectPill('focus','core')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><ellipse cx="12" cy="12" rx="8" ry="10"/><path d="M12 2v20"/></svg>Core</button>
      <button class="pill" onclick="selectPill('focus','legs')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 4v7l-3 9M14 4v7l3 9M8 11h8"/></svg>Legs</button>
      <button class="pill" onclick="selectPill('focus','back')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2C8 2 5 6 5 12s3 10 7 10 7-4 7-10S16 2 12 2z"/><path d="M12 2v20"/></svg>Back &amp; Pull</button>
      <button class="pill" onclick="selectPill('focus','full')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="4" r="2.5"/><path d="M12 6.5v6M12 12.5l-4 7M12 12.5l4 7M6 10h12"/></svg>Full Body</button>
    </div>
  </div>

  <!-- Step 2: Theme -->
  <div class="builder-section" id="step-theme">
    <span class="builder-step-num">Step 2 of 4</span>
    <div class="builder-step-title">Theme</div>
    <div class="pill-grid" id="theme-pills">
      <button class="pill" onclick="selectPill('theme','any')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16l-6.4 5.2 2.4-7.2-6-4.8h7.6z"/></svg>Any</button>
      <button class="pill" onclick="selectPill('theme','cardio')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1 1.1L12 21.3l7.8-7.8 1-1.1a5.5 5.5 0 000-7.8z"/></svg>Cardio</button>
      <button class="pill" onclick="selectPill('theme','mixed')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Mixed</button>
      <button class="pill" onclick="selectPill('theme','strength')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6.5 6.5v11M17.5 6.5v11M2 9v6M22 9v6M6.5 12h11M2 12h4.5M17.5 12H22"/></svg>Strength</button>
    </div>
  </div>

  <!-- Step 3: Format -->
  <div class="builder-section" id="step-format">
    <span class="builder-step-num">Step 3 of 4</span>
    <div class="builder-step-title">Format</div>
    <div class="pill-grid pill-grid-2col" id="format-pills">
      <button class="pill" onclick="selectPill('format','any')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16l-6.4 5.2 2.4-7.2-6-4.8h7.6z"/></svg>Any</button>
      <button class="pill" onclick="selectPill('format','amrap')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>AMRAP</button>
      <button class="pill" onclick="selectPill('format','chipper')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 10h12M4 14h8M4 18h4"/></svg>Chipper</button>
      <button class="pill" onclick="selectPill('format','partner_chipper')">

<script>
// ── Builder State ──
const builderState = { focus: null, theme: null, format: null, difficulty: null };
const builderSteps = ['focus', 'theme', 'format', 'difficulty'];
let builderStepIdx = 0;

function showBuilderStep(idx) {
  builderStepIdx = idx;
  builderSteps.forEach((step, i) => {
    const el = document.getElementById('step-' + step);
    el.classList.toggle('visible', i === idx);
  });
}

function selectPill(category, value) {
  builderState[category] = value;
  const container = document.getElementById(category + '-pills');
  container.querySelectorAll('.pill').forEach(p => p.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  // Auto-advance to next step or generate
  setTimeout(() => {
    const stepIdx = builderSteps.indexOf(category);
    if (stepIdx < builderSteps.length - 1) {
      showBuilderStep(stepIdx + 1);
    } else {
      generateFromBuilder();
    }
  }, 200);
}

function builderBack() {
  if (builderStepIdx > 0) {
    showBuilderStep(builderStepIdx - 1);
  } else {
    showScreen('start');
  }
}

function startBuilder() {
  builderState.focus = null;
  builderState.theme = null;
  builderState.format = null;
  builderState.difficulty = null;
  // Clear all pill selections
  document.querySelectorAll('#builder .pill').forEach(p => p.classList.remove('selected'));
  showBuilderStep(0);
  showScreen('builder');
}

function surpriseMe() {
  builderState.focus = 'any';
  builderState.theme = 'any';
  builderState.format = 'any';
  builderState.difficulty = ['easy','moderate','spicy','brutal','insane'][rand(0,4)];
  generateFromBuilder();
}

const difficultyMultipliers = {
  easy: 0.6,
  moderate: 0.85,
  spicy: 1.0,
  brutal: 1.3,
  insane: 1.7
};

function generateFromBuilder() {
  const { focus, theme, format, difficulty } = builderState;
  if (!focus || !theme || !format || !difficulty) return;
  const diffMult = difficultyMultipliers[difficulty] || 1.0;

  // Resolve "any" choices
  const focusOptions = ['any','upper','core','legs','back','full'];
  const themeOptions = ['cardio','mixed','strength'];
  const formatOptions = ['amrap','chipper','partner_chipper','emom','rounds','tabata','5x5'];

  const actualFocus = focus === 'any' ? focusOptions[rand(1, focusOptions.length-1)] : focus;
  const actualTheme = theme === 'any' ? themeOptions[rand(0, themeOptions.length-1)] : theme;
  const actualFormat = format === 'any' ? formatOptions[rand(0, formatOptions.length-1)] : format;

  currentFocus = actualFocus === 'any' ? null : actualFocus;
  currentType = actualTheme;

  // Pick exercises from focus pool or theme pool
  const pool = currentFocus ? bodyFocusExercises[currentFocus] : exercises[actualTheme];
  const pickFromPool = (n) => shuffle(pool).slice(0, Math.min(n, pool.length));

  const scaleReps = (name, mult) => String(Math.max(1, Math.round(parseInt(defaultReps[name]||'10') * mult * diffMult)));

  if (actualFormat === 'amrap') {
    const mins = Math.round(rand(16, 25) * diffMult);
    const exList = pickFromPool(rand(4,6)).map(name => ({ name, reps: scaleReps(name, 1) }));
    currentWOD = {
      type: actualTheme, formatName: 'AMRAP', description: `AMRAP ${mins} min`,
      exercises: exList, sets: null,
      timerConfig: { type:'amrap', duration: mins*60 }
    };
  } else if (actualFormat === 'chipper') {
    const exList = pickFromPool(rand(8,12)).map(name => ({ name, reps: scaleReps(name, 1.5) }));
    currentWOD = {
      type: actualTheme, formatName: 'Chipper', description: 'For Time — work through all exercises once',
      exercises: exList, sets: null,
      timerConfig: { type:'fortime', cap:40 }
    };
  } else if (actualFormat === 'partner_chipper') {
    const exList = pickFromPool(rand(8,12)).map(name => ({ name, reps: scaleReps(name, 2) }));
    currentWOD = {
      type: actualTheme, formatName: 'Partner Chipper',
      description: 'For Time with a partner — split reps, one works at a time',
      exercises: exList, sets: null,
      timerConfig: { type:'fortime', cap:40 }
    };
  } else if (actualFormat === 'emom') {
    const exList = pickFromPool(rand(3,4)).map(name => ({ name, reps: scaleReps(name, 0.5) }));
    const totalMin = exList.length * rand(3,5);
    currentWOD = {
      type: actualTheme, formatName: 'EMOM', description: `EMOM ${totalMin} min`,
      exercises: exList, sets: null,
      timerConfig: { type:'emom', totalRounds: totalMin }
    };
  } else if (actualFormat === 'rounds') {
    const rounds = Math.max(2, Math.round(rand(3,5) * diffMult));
    const exList = pickFromPool(rand(4,6)).map(name => ({ name, reps: scaleReps(name, 1) }));
    currentWOD = {
      type: actualTheme, formatName: 'Rounds For Time', description: `${rounds} Rounds For Time`,
      exercises: exList, sets: null, rounds,
      timerConfig: { type:'fortime', cap:40 }
    };
  } else if (actualFormat === 'tabata') {
    const exList = pickFromPool(rand(3,5)).map(name => ({ name, reps: '20s' }));
    currentWOD = {
      type: actualTheme, formatName: 'Tabata', description: '8 rounds: 20s work / 10s rest per station',
      exercises: exList, sets: null,
      timerConfig: { type:'tabata', stations: exList.length }
    };
  } else if (actualFormat === '5x5') {
    const reps = Math.max(1, Math.round(5 * diffMult));
    const sets = Math.max(3, Math.round(5 * diffMult));
    const exList = pickFromPool(rand(3,4)).map(name => ({ name, reps: String(reps) }));
    currentWOD = {
      type: actualTheme, formatName: `${sets}x${reps} Strength`,
      description: `${sets} sets of ${reps} — rest 2:00 between sets`,
      exercises: exList, sets,
      timerConfig: { type:'rest', work:0, rest:120, rounds:sets }
    };
  }

  renderWOD();
  showScreen('wod');
}

// ── State ──

function showScreen(id) {

}

// ── Audio (Web Audio API — works on iOS) ──
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, duration, vol) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = freq;
  gain.gain.value = vol || 0.3;
  osc.start(); osc.stop(ctx.currentTime + duration);
}
function shortBeep() { beep(880, 0.12, 0.25); }
function longBeep() { beep(660, 0.5, 0.4); }
function doubleBeep() { beep(880, 0.12, 0.3); setTimeout(() => beep(1100, 0.2, 0.35), 180); }

// ── Wake Lock ──
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

function rand(a,b) { return a + Math.floor(Math.random()*(b-a+1)); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickN(type, n) {
  const pool = shuffle(exercises[type]);
  return pool.slice(0, Math.min(n, pool.length));
}

function pickNAll(n) {
  const all = [...exercises.cardio, ...exercises.mixed, ...exercises.strength];
  return shuffle([...new Set(all)]).slice(0, n);
}

// Body focus exercise pools

function generateWOD(type) {
  currentType = type;
  currentFocus = null;
  const formats = wodFormats[type];
  const fmt = formats[Math.floor(Math.random()*formats.length)];

  const exNames = fmt.pickExercises();
  const mult = fmt.repsMultiplier || 1;
  const exList = exNames.map(name => {
    let reps = fmt.fixedReps || String(Math.round(parseInt(defaultReps[name]||'10') * mult));
    if (fmt.useTabataReps) reps = '20s';
    return { name, reps };
  });

  const minutes = fmt.minutes ? fmt.minutes() : null;
  const rounds = fmt.rounds ? fmt.rounds() : null;
  const totalMin = fmt.timer.rounds ? (typeof fmt.timer.rounds === 'function' ? fmt.timer.rounds() : fmt.timer.rounds) * exList.length : null;

  let descText = typeof fmt.desc === 'function' ? fmt.desc({ minutes, rounds, totalMin }) : fmt.desc;

  currentWOD = {
    type, formatName: fmt.name, description: descText,
    exercises: exList,
    sets: fmt.sets || null,
    timerConfig: { ...fmt.timer },
    minutes, rounds, totalMin
  };

  // Resolve timer config
  if (currentWOD.timerConfig.type === 'amrap') {
    currentWOD.timerConfig.duration = (minutes || 20) * 60;
  }
  if (currentWOD.timerConfig.type === 'emom') {
    currentWOD.timerConfig.totalRounds = totalMin || 12;
  }
  if (currentWOD.timerConfig.type === 'tabata') {
    currentWOD.timerConfig.stations = exList.length;
  }

  renderWOD();
  showScreen('wod');
}

  'Farmer Carry (m)':0.12, 'Plank Hold (sec)':0.08
};

function estimateKcal(wod) {
  let total = 0;
  const rounds = wod.rounds || wod.sets || 1;
  // For AMRAP, estimate ~3-4 rounds in the time
  const amrapRounds = wod.timerConfig && wod.timerConfig.type === 'amrap'
    ? Math.max(1, Math.round((wod.timerConfig.duration || 1200) / 300)) : 0;
  // For EMOM, each exercise done once per minute for totalRounds minutes
  const emomRounds = wod.timerConfig && wod.timerConfig.type === 'emom'
    ? Math.round((wod.timerConfig.totalRounds || 12) / Math.max(1, wod.exercises.length)) : 0;
  // Tabata: 8 rounds of 20s per station — estimate ~8 reps per 20s station
  const tabataRounds = wod.timerConfig && wod.timerConfig.type === 'tabata' ? 8 : 0;

  const effectiveRounds = amrapRounds || emomRounds || tabataRounds || rounds;

  wod.exercises.forEach(ex => {
    const perRep = kcalPerRep[ex.name] || 0.5;
    const reps = parseInt(ex.reps) || 10;
    total += perRep * reps * effectiveRounds;
  });

  // Add ~10% for warm-up/transitions
  total *= 1.1;
  return Math.round(total);
}

function getExercisePool() {
  return currentFocus ? bodyFocusExercises[currentFocus] : exercises[currentType];

function swapExercise(idx) {
  const pool = getExercisePool();
  const used = new Set(currentWOD.exercises.map(e=>e.name));
  const available = pool.filter(n=>!used.has(n));
  if (!available.length) return;
  const newName = available[Math.floor(Math.random()*available.length)];
  currentWOD.exercises[idx].name = newName;
  currentWOD.exercises[idx].reps = defaultReps[newName] || '10';
  renderWOD();
}

function removeExercise(idx) {
  if (currentWOD.exercises.length <= 1) return;
  currentWOD.exercises.splice(idx, 1);
  renderWOD();
}

function addRandomExercise() {
  const pool = getExercisePool();
  const used = new Set(currentWOD.exercises.map(e=>e.name));
  const available = pool.filter(n=>!used.has(n));
  if (!available.length) return;
  const name = available[Math.floor(Math.random()*available.length)];
  currentWOD.exercises.push({ name, reps: defaultReps[name] || '10' });
  renderWOD();
}

function adjustTimeCap(delta) {
  const tc = currentWOD.timerConfig;
  if (tc.type === 'amrap') {
    const mins = Math.max(5, Math.round(tc.duration / 60) + delta);
    tc.duration = mins * 60;
    currentWOD.description = `AMRAP ${mins} min`;
  } else if (tc.type === 'fortime') {
    tc.cap = Math.max(5, tc.cap + delta);
  }
  renderWOD();
}

function makeDifficulty(dir) {
  // dir: 1 = harder (+25% reps), -1 = easier (-20% reps)
  currentWOD.exercises.forEach(ex => {
    // Try to parse numeric portion
    const match = ex.reps.match(/^(\d+)(.*)/);
    if (match) {
      let num = parseInt(match[1]);
      if (dir > 0) num = Math.ceil(num * 1.25);
      else num = Math.max(1, Math.floor(num * 0.8));
      ex.reps = num + match[2];
    }
  });
  renderWOD();
}

// ── Timer ──
function buildTimerPlan() {
  const cfg = currentWOD.timerConfig;
  const phases = [];
  if (cfg.type === 'amrap') {
    phases.push({ label:'AMRAP', duration: cfg.duration, countdown:true, beepAtEnd:true });
  } else if (cfg.type === 'fortime') {
    phases.push({ label:'For Time', duration: cfg.cap*60, countdown:true, countUp:true, beepAtEnd:true });
  } else if (cfg.type === 'emom') {
    for (let r=0; r<cfg.totalRounds; r++) {
      phases.push({ label:`Min ${r+1} of ${cfg.totalRounds}`, duration:60, countdown:true, beepAtEnd:true, round:r+1, totalRounds:cfg.totalRounds });
    }
  } else if (cfg.type === 'tabata') {
    const stations = cfg.stations || 4;
    for (let s=0; s<stations; s++) {
      for (let r=0; r<8; r++) {
        phases.push({ label:`Station ${s+1}: WORK`, duration:20, countdown:true, beepAtEnd:true, round:r+1, totalRounds:8, isWork:true });
        phases.push({ label:`Station ${s+1}: REST`, duration:10, countdown:true, beepAtEnd:true, round:r+1, totalRounds:8 });
      }
      if (s < stations-1) {
        phases.push({ label:'Switch Station', duration:10, countdown:true, beepAtEnd:true });
      }
    }
  } else if (cfg.type === 'rest') {
    for (let r=0; r<cfg.rounds; r++) {
      phases.push({ label:`Set ${r+1} of ${cfg.rounds} — WORK`, duration:0, countUp:true, manual:true, round:r+1, totalRounds:cfg.rounds });
      if (r < cfg.rounds-1) {
        phases.push({ label:'REST', duration:cfg.rest, countdown:true, beepAtEnd:true, round:r+1, totalRounds:cfg.rounds });
      }
    }
  }
  return phases;
}

function fmtTime(sec) {
  const m = Math.floor(Math.abs(sec)/60);
  const s = Math.abs(sec)%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function startTimer() {
  // Unlock audio on user gesture
  getAudioCtx().resume();
  shortBeep();

  timerPlan = buildTimerPlan();
  if (!timerPlan.length) return;
  timerPhaseIdx = 0;
  timerPaused = false;
  currentExIdx = 0;
  emomRoundDone = 0;
  timerStartTime = Date.now();
  exerciseTimes = currentWOD.exercises.map(ex => ({
    name: ex.name, reps: ex.reps, startTime: null, endTime: null
  }));
  if (exerciseTimes.length) exerciseTimes[0].startTime = Date.now();
  lastReport = null;
  requestWakeLock();
  showScreen('timer');
  renderExerciseTracker();
  startPhase();
}

function startPhase() {
  const phase = timerPlan[timerPhaseIdx];
  timerPhaseRemaining = phase.duration;
  timerSeconds = phase.countUp ? 0 : phase.duration;
  renderTimer();
  document.getElementById('timer-toggle').textContent = phase.manual ? 'Next Set' : 'Pause';

  if (phase.manual) {
    // count-up, wait for manual advance
    timerInterval = setInterval(() => {
      if (!timerPaused) { timerSeconds++; renderTimer(); }
    }, 1000);
  } else {
    timerInterval = setInterval(() => {
      if (timerPaused) return;
      timerPhaseRemaining--;
      timerSeconds = phase.countUp ? timerSeconds+1 : timerPhaseRemaining;
      renderTimer();
      // beeps at 3,2,1
      if (timerPhaseRemaining <= 3 && timerPhaseRemaining > 0) shortBeep();
      if (timerPhaseRemaining <= 0) {
        if (phase.beepAtEnd) longBeep();
        clearInterval(timerInterval);
        nextPhase();
      }
    }, 1000);
  }
}

function nextPhase() {
  timerPhaseIdx++;
  if (timerPhaseIdx >= timerPlan.length) {
    doubleBeep(); setTimeout(doubleBeep, 400);
    releaseWakeLock();
    finishAndShowReport();
    return;
  }
  startPhase();
}

function finishAndShowReport() {
  const now = Date.now();
  // Close any open exercise
  if (currentExIdx < exerciseTimes.length && !exerciseTimes[currentExIdx].endTime) {
    exerciseTimes[currentExIdx].endTime = now;
  }
  const totalSec = Math.round((now - timerStartTime) / 1000);
  lastReport = {
    totalSeconds: totalSec,
    exercises: exerciseTimes.map(et => ({
      name: et.name, reps: et.reps,
      seconds: et.startTime && et.endTime ? Math.round((et.endTime - et.startTime) / 1000) : null
    }))
  };
  renderReport();
  showScreen('report');
}

function isEmomMode() {
  return currentWOD && currentWOD.timerConfig && currentWOD.timerConfig.type === 'emom';
}

function renderExerciseTracker() {
  const exs = currentWOD.exercises;
  const el = document.getElementById('timer-exercises');
  const controls = document.getElementById('timer-ex-controls');
  if (!exs || !exs.length) { el.innerHTML = ''; controls.classList.add('has-exercises'); controls.classList.remove('has-exercises'); return; }
  controls.classList.add('has-exercises');

  let html = '';

  if (isEmomMode()) {
    // EMOM: show all exercises for this minute
    const phase = timerPlan && timerPlan[timerPhaseIdx];
    const roundNum = phase ? phase.round : (emomRoundDone + 1);
    const totalRounds = phase ? phase.totalRounds : (currentWOD.timerConfig.totalRounds || '?');
    html += `<div class="timer-ex-next-label">This minute</div>`;
    exs.forEach(ex => {
      html += `<div class="timer-ex-current" style="margin-bottom:4px;">${ex.reps} ${ex.name}</div>`;
    });
    html += `<div style="color:var(--muted);font-size:0.75em;margin-top:6px;">Round ${roundNum} / ${totalRounds}</div>`;
    el.innerHTML = html;
    // In EMOM, prev/next not used for individual exercises
    document.getElementById('ex-prev-btn').style.display = 'none';
    document.getElementById('ex-next-btn').textContent = emomRoundDone >= (currentWOD.timerConfig.totalRounds || 0) ? 'Done' : 'Round Done';
    renderLandscapeBar();
    return;
  }

  // Normal mode: one exercise at a time
  document.getElementById('ex-prev-btn').style.display = '';
  if (currentExIdx > 0) {
    const prev = exs[currentExIdx - 1];
    html += `<div class="timer-ex-done">${prev.reps} ${prev.name}</div>`;
  }
  if (currentExIdx < exs.length) {
    const cur = exs[currentExIdx];
    html += `<div class="timer-ex-current">${cur.reps} ${cur.name}</div>`;
    if (currentExIdx + 1 < exs.length) {
      const nxt = exs[currentExIdx + 1];
      html += `<div class="timer-ex-next-label">Up next</div>`;
      html += `<div class="timer-ex-next">${nxt.reps} ${nxt.name}</div>`;
    }
  } else {
    html += `<div class="timer-ex-finished">All exercises done!</div>`;
  }
  html += `<div style="color:var(--muted);font-size:0.75em;margin-top:6px;">${Math.min(currentExIdx + 1, exs.length)} / ${exs.length}</div>`;
  el.innerHTML = html;

  document.getElementById('ex-prev-btn').disabled = currentExIdx <= 0;
  document.getElementById('ex-prev-btn').style.opacity = currentExIdx <= 0 ? '0.3' : '1';
  document.getElementById('ex-next-btn').textContent = currentExIdx >= exs.length - 1 ? 'Done' : 'Next';
  renderLandscapeBar();
}

function renderLandscapeBar() {
  const bar = document.getElementById('landscape-top-bar');
  const exs = currentWOD.exercises;
  if (!exs || !exs.length) { bar.innerHTML = ''; return; }

  let centerHtml = '';
  if (isEmomMode()) {
    const phase = timerPlan && timerPlan[timerPhaseIdx];
    const roundNum = phase ? phase.round : (emomRoundDone + 1);
    const total = phase ? phase.totalRounds : (currentWOD.timerConfig.totalRounds || '?');
    const allExs = exs.map(ex => `${ex.reps} ${ex.name}`).join(' + ');
    centerHtml = `<span class="ls-ex-current">${allExs}</span>
      <span class="ls-ex-label">Rd ${roundNum}/${total}</span>`;
  } else if (currentExIdx < exs.length) {
    const cur = exs[currentExIdx];
    centerHtml = `<span class="ls-ex-current">${cur.reps} ${cur.name}</span>`;
    if (currentExIdx + 1 < exs.length) {
      const nxt = exs[currentExIdx + 1];
      centerHtml += `<span class="ls-ex-label">next</span><span class="ls-ex-next">${nxt.reps} ${nxt.name}</span>`;
    }
  } else {
    centerHtml = `<span class="ls-ex-current" style="color:var(--green)">All done!</span>`;
  }

  const prevDisabled = isEmomMode() ? true : currentExIdx <= 0;
  const nextLabel = isEmomMode()
    ? (emomRoundDone >= (currentWOD.timerConfig.totalRounds || 0) ? 'Done' : 'Round Done')
    : (currentExIdx >= exs.length - 1 ? 'Done' : 'Next');

  bar.innerHTML = `
    <button class="ls-btn" onclick="prevExercise()" ${prevDisabled ? 'style="opacity:0.3"' : ''}>Back</button>
    <div class="ls-exercises">${centerHtml}</div>
    <button class="ls-btn" onclick="nextExercise()" style="background:var(--green);color:#111">${nextLabel}</button>
  `;
}

function nextExercise() {
  shortBeep();
  const now = Date.now();

  if (isEmomMode()) {
    // EMOM: "Round Done" confirms you finished all exercises for this minute
    emomRoundDone++;
    renderExerciseTracker();
    return;
  }

  // Normal mode: advance one exercise
  if (currentExIdx < exerciseTimes.length) {
    exerciseTimes[currentExIdx].endTime = now;
  }
  if (currentExIdx < currentWOD.exercises.length) currentExIdx++;
  if (currentExIdx < exerciseTimes.length && !exerciseTimes[currentExIdx].startTime) {
    exerciseTimes[currentExIdx].startTime = now;
  }
  renderExerciseTracker();
}

function prevExercise() {
  if (currentExIdx > 0) {
    // Reset current start, reopen previous
    if (currentExIdx < exerciseTimes.length) exerciseTimes[currentExIdx].startTime = null;
    currentExIdx--;
    exerciseTimes[currentExIdx].endTime = null;
    exerciseTimes[currentExIdx].startTime = Date.now();
  }
  renderExerciseTracker();
}

function renderTimer() {
  document.getElementById('timer-display').textContent = fmtTime(timerSeconds);
  const phase = timerPlan[timerPhaseIdx];
  document.getElementById('timer-phase').textContent = phase.label;
  document.getElementById('timer-round').textContent =
    phase.round ? `Round ${phase.round}/${phase.totalRounds}` : '';
  // Keep exercise tracker in sync (esp. EMOM round display)
  if (isEmomMode()) renderExerciseTracker();
}

function toggleTimer() {
  const phase = timerPlan[timerPhaseIdx];
  if (phase && phase.manual) {
    // manual mode: "Next Set" advances
    clearInterval(timerInterval);
    longBeep();
    nextPhase();
    return;
  }
  timerPaused = !timerPaused;
  document.getElementById('timer-toggle').textContent = timerPaused ? 'Resume' : 'Pause';
}

function stopTimer() {
  timerPaused = true;
  document.getElementById('timer-toggle').textContent = 'Resume';
  if (!confirm('Stop the workout?')) {
    timerPaused = false;
    document.getElementById('timer-toggle').textContent = 'Pause';
    return;
  }
  clearInterval(timerInterval);
  releaseWakeLock();
  finishAndShowReport();
}

// ── Report ──
function renderReport() {
  if (!lastReport) return;
  document.getElementById('report-total').textContent = 'Total: ' + fmtTime(lastReport.totalSeconds);
  const maxSec = Math.max(...lastReport.exercises.map(e => e.seconds || 0), 1);
  let html = '';
  lastReport.exercises.forEach(ex => {
    const sec = ex.seconds;
    const pct = sec ? Math.round((sec / maxSec) * 100) : 0;
    html += `<div class="report-row">
      <div class="report-ex">${ex.reps} ${ex.name}
        <div class="report-bar-bg"><div class="report-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="report-time">${sec !== null ? fmtTime(sec) : '--'}</div>
    </div>`;
  });
  document.getElementById('report-card').innerHTML = html;
}

function logWorkoutWithReport() {
  const h = getHistory();
  h.unshift({
    date: new Date().toISOString(),
    wod: JSON.parse(JSON.stringify(currentWOD)),
    report: lastReport ? JSON.parse(JSON.stringify(lastReport)) : null
  });
  if (h.length > 100) h.length = 100;
  saveHistory(h);
  alert('Workout logged!');
  showScreen('start');
}

// ── History (localStorage) ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem('wod_history') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('wod_history', JSON.stringify(h)); }

function logWorkout() {
  const h = getHistory();
  h.unshift({
    date: new Date().toISOString(),
    wod: JSON.parse(JSON.stringify(currentWOD))
  });
  // Keep last 100
  if (h.length > 100) h.length = 100;
  saveHistory(h);
  alert('Workout logged!');
}

function showHistory() {
  const h = getHistory();
  const list = document.getElementById('history-list');
  if (!h.length) {
    list.innerHTML = '<div class="history-empty">No workouts logged yet.<br>Complete a workout to see it here.</div>';
    showScreen('history');
    return;
  }
  list.innerHTML = h.map((entry, i) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    const exSummary = entry.wod.exercises.map(e => `${e.reps} ${e.name}`).join(' | ');
    const rpt = entry.report;
    const totalStr = rpt ? ` &mdash; ${fmtTime(rpt.totalSeconds)}` : '';
    let reportHtml = '';
    if (rpt && rpt.exercises) {
      const lines = rpt.exercises.map(e =>
        `${e.reps} ${e.name}: ${e.seconds !== null ? fmtTime(e.seconds) : '--'}`
      ).join('<br>');
      reportHtml = `<button class="history-report-toggle" onclick="event.stopPropagation();this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">Report</button>
        <div class="history-report" style="display:none">${lines}</div>`;
    }
    const rating = entry.rating || 0;
    const stars = [1,2,3,4].map(s =>
      `<button class="star-btn ${s <= rating ? 'filled' : ''}" onclick="event.stopPropagation();rateWOD(${i},${s})">&#9733;</button>`
    ).join('');
    return `<div class="history-item" style="margin-bottom:10px;">
      <button class="history-delete" onclick="event.stopPropagation();deleteHistoryWOD(${i})" title="Delete">&#10005;</button>
      <div onclick="loadHistoryWOD(${i})">
        <div class="history-date">${dateStr}${totalStr}</div>
        <div class="history-wod-name">${entry.wod.formatName}</div>
        <div class="history-type">${entry.wod.type}</div>
        <div class="star-rating">${stars}</div>
        <div class="history-exercises">${exSummary}</div>
        ${reportHtml}
      </div>
    </div>`;
  }).join('');
  showScreen('history');
}

function rateWOD(idx, stars) {
  const h = getHistory();
  h[idx].rating = h[idx].rating === stars ? 0 : stars; // tap same star to clear
  saveHistory(h);
  showHistory();
}

function deleteHistoryWOD(idx) {
  const h = getHistory();
  h.splice(idx, 1);
  saveHistory(h);
  showHistory();
}

function loadHistoryWOD(idx) {
  const h = getHistory();
  currentWOD = JSON.parse(JSON.stringify(h[idx].wod));
  currentType = currentWOD.type;
  renderWOD();
  showScreen('wod');
}

// ── Init ──
showBuilderStep(0);

// ── PWA Registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
