<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WOD">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>WOD Finder</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --muted: #888;
  --green: #4ecca3;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  overflow-x: hidden;
}
.screen { display:none; flex-direction:column; min-height:calc(100vh - var(--safe-top)); padding:20px; }
.screen.active { display:flex; }

/* Home screen */
#home { justify-content:center; align-items:center; gap:20px; }
#home h1 { font-size:2.2em; letter-spacing:2px; color:var(--accent); }
#home p { color:var(--muted); font-size:0.95em; margin-bottom:10px; }
.choice-grid { display:flex; flex-direction:column; gap:14px; width:100%; max-width:340px; }
.choice-btn {
  background: var(--card); border:2px solid var(--accent2); color:var(--text);
  font-size:1.15em; padding:18px; border-radius:14px; cursor:pointer;
  display:flex; align-items:center; gap:12px; transition:all .15s;
}
.choice-btn:active { background:var(--accent2); transform:scale(0.97); }
.choice-btn .icon { font-size:1.6em; }
.focus-grid { display:flex; flex-direction:row; flex-wrap:wrap; gap:10px; }
.focus-btn { flex:1 1 45%; padding:14px; font-size:1em; }
.divider { color:var(--muted); text-align:center; font-size:0.85em; margin:6px 0; }

/* WOD screen */
#wod { gap:14px; }
#wod h2 { color:var(--accent); font-size:1.4em; text-align:center; }
.wod-type-label { text-align:center; color:var(--muted); font-size:0.85em; text-transform:uppercase; letter-spacing:1px; }
.wod-card {
  background:var(--card); border-radius:14px; padding:16px; margin-top:4px;
}
.wod-name { font-size:1.1em; font-weight:700; color:var(--green); margin-bottom:8px; }
.wod-format { font-size:0.85em; color:var(--muted); margin-bottom:10px; }
.exercise-row {
  display:flex; align-items:center; gap:8px; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.exercise-row:last-child { border-bottom:none; }
.exercise-text { flex:1; font-size:0.95em; }
.exercise-actions { display:flex; gap:6px; }
.ex-btn {
  background:var(--accent2); border:none; color:var(--text); width:32px; height:32px;
  border-radius:8px; font-size:0.85em; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.ex-btn:active { opacity:0.7; }
.btn-row { display:flex; gap:10px; margin-top:auto; padding-top:14px; }
.btn {
  flex:1; padding:15px; border:none; border-radius:12px; font-size:1em;
  font-weight:600; cursor:pointer; transition:all .15s;
}
.btn:active { transform:scale(0.97); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-outline { background:transparent; border:2px solid var(--accent2); color:var(--text); }
.btn-green { background:var(--green); color:#111; }
.btn-small { padding:10px 14px; font-size:0.9em; }

/* Timer screen */
#timer { justify-content:center; align-items:center; gap:12px; }
.timer-display {
  font-size:min(22vw, 30vh); font-weight:700; font-variant-numeric:tabular-nums;
  color:var(--text); text-align:center; line-height:1;
}
.timer-phase { font-size:1.4em; color:var(--green); text-align:center; }
.timer-round { color:var(--muted); font-size:1.1em; text-align:center; }
.timer-controls { display:flex; gap:12px; }
.timer-ex-controls { display:flex; gap:12px; }
/* Exercise tracker on timer */
.timer-exercise-tracker { width:100%; max-width:360px; text-align:center; }
.timer-ex-current {
  font-size:1.3em; font-weight:700; color:var(--text); padding:8px 0;
  background:var(--accent2); border-radius:10px; margin-bottom:6px;
}
.timer-ex-done {
  font-size:0.85em; color:var(--muted); padding:3px 0;
  text-decoration:line-through; opacity:0.5;
}
.timer-ex-next {
  font-size:0.95em; color:var(--muted); padding:3px 0;
}
.timer-ex-next-label { font-size:0.75em; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
.timer-ex-finished { font-size:1.3em; font-weight:700; color:var(--green); padding:8px 0; }

/* Landscape timer — fill the screen */
@media (orientation: landscape) {
  #timer { padding:10px; gap:4px; min-height:100vh; flex-direction:row; flex-wrap:wrap; }
  #timer .timer-exercise-tracker { display:none; }
  #timer .timer-ex-controls { display:none; }
  #timer .timer-display { font-size:min(40vw, 55vh); line-height:1; width:100%; }
  #timer .timer-phase { font-size:min(6vw, 8vh); width:100%; }
  #timer .timer-round { font-size:min(4vw, 5vh); width:100%; }
  #timer .timer-controls { gap:16px; }
  #timer .timer-controls .btn { padding:10px 28px; font-size:min(3.5vw, 4vh); }
}

/* Exercise equipment tag */
.exercise-equip {
  font-size:0.7em; color:var(--accent); background:rgba(233,69,96,0.15);
  padding:2px 6px; border-radius:5px; margin-left:6px; white-space:nowrap;
}
/* Add exercise button */
.add-exercise-btn {
  display:flex; align-items:center; justify-content:center; gap:6px;
  width:100%; padding:10px; margin-top:6px; background:transparent;
  border:1px dashed var(--accent2); color:var(--muted); border-radius:10px;
  font-size:0.9em; cursor:pointer;
}
.add-exercise-btn:active { background:var(--accent2); color:var(--text); }
/* Difficulty buttons */
.difficulty-row { display:flex; gap:8px; margin-top:4px; }
.diff-btn {
  flex:1; padding:10px; border:1px solid var(--accent2); background:transparent;
  color:var(--text); border-radius:10px; font-size:0.85em; cursor:pointer; text-align:center;
}
.diff-btn:active { background:var(--accent2); }
/* Time cap adjuster */
.time-cap-row {
  display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px;
}
.time-cap-row span { color:var(--muted); font-size:0.9em; }
.time-cap-val { font-size:1.1em; font-weight:700; color:var(--green); min-width:50px; text-align:center; }
.time-cap-btn {
  background:var(--accent2); border:none; color:var(--text); width:36px; height:36px;
  border-radius:10px; font-size:1.2em; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.time-cap-btn:active { opacity:0.7; }

/* Edit modal */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:100; justify-content:center; align-items:flex-end;
}
.modal-overlay.active { display:flex; }
.modal {
  background:var(--card); border-radius:18px 18px 0 0; padding:24px 20px;
  padding-bottom:calc(20px + var(--safe-bottom)); width:100%; max-width:400px;
  max-height:70vh; overflow-y:auto;
}
.modal h3 { margin-bottom:14px; color:var(--accent); }
.modal input, .modal select {
  width:100%; padding:12px; background:var(--bg); border:1px solid var(--accent2);
  color:var(--text); border-radius:10px; font-size:1em; margin-bottom:10px;
  -webkit-appearance:none;
}
.modal .btn { margin-top:6px; }

/* History screen */
#history { gap:14px; }
#history h2 { color:var(--accent); font-size:1.4em; text-align:center; }
.history-empty { text-align:center; color:var(--muted); margin-top:40px; }
.history-item {
  background:var(--card); border-radius:12px; padding:14px; cursor:pointer;
  transition:all .15s;
}
.history-item:active { transform:scale(0.98); }
.history-date { font-size:0.8em; color:var(--muted); }
.history-wod-name { font-size:1em; font-weight:600; color:var(--green); margin:4px 0; }
.history-type { font-size:0.8em; color:var(--accent); text-transform:uppercase; letter-spacing:1px; }
.history-exercises { font-size:0.85em; color:var(--muted); margin-top:6px; }
.history-delete {
  float:right; background:var(--accent); border:none; color:#fff; width:28px; height:28px;
  border-radius:8px; font-size:0.85em; cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.history-delete:active { opacity:0.7; }
/* Report screen */
#report { gap:14px; }
#report h2 { color:var(--green); font-size:1.4em; text-align:center; }
.report-total { text-align:center; font-size:1.6em; font-weight:700; color:var(--accent); }
.report-row {
  display:flex; justify-content:space-between; align-items:center; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.report-row:last-child { border-bottom:none; }
.report-ex { flex:1; font-size:0.95em; }
.report-time { font-weight:700; font-variant-numeric:tabular-nums; color:var(--green); min-width:60px; text-align:right; }
.report-bar-bg { height:6px; background:var(--accent2); border-radius:3px; margin-top:4px; }
.report-bar { height:6px; background:var(--green); border-radius:3px; }
.history-report-toggle {
  font-size:0.8em; color:var(--green); background:none; border:1px solid var(--green);
  padding:3px 8px; border-radius:6px; cursor:pointer; margin-top:4px;
}
.history-report { font-size:0.8em; color:var(--muted); margin-top:6px; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="home" class="screen active">
  <h1>WOD</h1>
  <p>Workout of the Day</p>
  <div class="choice-grid">
    <button class="choice-btn" onclick="generateWOD('cardio')">
      <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 00-7.8 7.8l1 1.1L12 21.3l7.8-7.8 1-1.1a5.5 5.5 0 000-7.8z"/></svg></span> Cardio
    </button>
    <button class="choice-btn" onclick="generateWOD('mixed')">
      <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></span> Mixed
    </button>
    <button class="choice-btn" onclick="generateWOD('strength')">
      <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.5"><path d="M6.5 6.5v11M17.5 6.5v11M2 9v6M22 9v6M6.5 12h11M2 12h4.5M17.5 12H22"/></svg></span> Strength
    </button>
  </div>
  <div class="divider">&mdash; pick a format &mdash;</div>
  <div class="choice-grid">
    <button class="choice-btn" onclick="generateSpecific('chipper')">
      <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><path d="M4 6h16M4 10h12M4 14h8M4 18h4"/></svg></span> Chipper
    </button>
    <button class="choice-btn" onclick="generateSpecific('partner_chipper')">
      <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><circle cx="9" cy="7" r="3"/><circle cx="17" cy="7" r="3"/><path d="M2 21v-2a4 4 0 014-4h6a4 4 0 014 4v2"/></svg></span> Partner Chipper
    </button>
    <button class="choice-btn" onclick="generateSpecific('amrap')">
      <span class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></span> AMRAP
    </button>
  </div>
  <div class="divider">&mdash; body focus &mdash;</div>
  <div class="choice-grid focus-grid">
    <button class="choice-btn focus-btn" onclick="generateBodyFocus('upper')">
      <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><path d="M12 2v8M8 6l4 4 4-4M4 16l4-4M20 16l-4-4M2 20h6M16 20h6"/></svg></span> Arms &amp; Shoulders
    </button>
    <button class="choice-btn focus-btn" onclick="generateBodyFocus('core')">
      <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><ellipse cx="12" cy="12" rx="8" ry="10"/><path d="M12 2v20M4.5 8h15M4.5 16h15"/></svg></span> Core
    </button>
    <button class="choice-btn focus-btn" onclick="generateBodyFocus('legs')">
      <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><path d="M10 4v7l-3 9M14 4v7l3 9M8 11h8"/></svg></span> Legs
    </button>
    <button class="choice-btn focus-btn" onclick="generateBodyFocus('back')">
      <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><path d="M12 2C8 2 5 6 5 12s3 10 7 10 7-4 7-10S16 2 12 2z"/><path d="M12 2v20"/></svg></span> Back &amp; Pull
    </button>
    <button class="choice-btn focus-btn" onclick="generateBodyFocus('full')">
      <span class="icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2.2"><circle cx="12" cy="4" r="2.5"/><path d="M12 6.5v6M12 12.5l-4 7M12 12.5l4 7M6 10h12"/></svg></span> Full Body
    </button>
  </div>
  <div class="divider">&mdash; or &mdash;</div>
  <button class="btn btn-outline btn-small" onclick="showHistory()" style="max-width:340px;width:100%;">
    Redo a Past Workout
  </button>
</div>

<!-- WOD SCREEN -->
<div id="wod" class="screen">
  <h2 id="wod-title">Your WOD</h2>
  <div class="wod-type-label" id="wod-type-label"></div>
  <div class="wod-card" id="wod-card"></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="reroll()">&#8635; New WOD</button>
    <button class="btn btn-green" onclick="confirmWOD()">Confirm</button>
  </div>
  <button class="btn btn-outline btn-small" onclick="showScreen('home')" style="margin-top:6px;">Back</button>
</div>

<!-- CONFIRMED SCREEN (with timer launch) -->
<div id="confirmed" class="screen" style="justify-content:center;align-items:center;gap:20px;">
  <h2 style="color:var(--green);">Let's Go!</h2>
  <div class="wod-card" id="confirmed-card" style="width:100%;"></div>
  <div class="btn-row" style="width:100%;">
    <button class="btn btn-accent" id="start-timer-btn" onclick="startTimer()">Start Timer</button>
  </div>
  <div class="btn-row" style="width:100%;">
    <button class="btn btn-green" onclick="logWorkout()">Log as Done</button>
  </div>
  <button class="btn btn-outline btn-small" onclick="showScreen('home')" style="width:100%;">Home</button>
</div>

<!-- TIMER SCREEN -->
<div id="timer" class="screen">
  <div class="timer-exercise-tracker" id="timer-exercises"></div>
  <div class="timer-phase" id="timer-phase"></div>
  <div class="timer-display" id="timer-display">00:00</div>
  <div class="timer-round" id="timer-round"></div>
  <div class="timer-ex-controls" id="timer-ex-controls">
    <button class="btn btn-outline btn-small" id="ex-prev-btn" onclick="prevExercise()">Back</button>
    <button class="btn btn-accent btn-small" id="ex-next-btn" onclick="nextExercise()">Next</button>
  </div>
  <div class="timer-controls">
    <button class="btn btn-accent" id="timer-toggle" onclick="toggleTimer()">Pause</button>
    <button class="btn btn-outline" onclick="stopTimer()">Stop</button>
  </div>
</div>

<!-- REPORT SCREEN -->
<div id="report" class="screen">
  <h2>Workout Report</h2>
  <div class="report-total" id="report-total"></div>
  <div class="wod-card" id="report-card"></div>
  <div class="btn-row">
    <button class="btn btn-green" onclick="logWorkoutWithReport()">Log as Done</button>
  </div>
  <button class="btn btn-outline btn-small" onclick="showScreen('home')" style="margin-top:6px;">Home</button>
</div>

<!-- HISTORY SCREEN -->
<div id="history" class="screen">
  <h2>Past Workouts</h2>
  <div id="history-list"></div>
  <button class="btn btn-outline btn-small" onclick="showScreen('home')" style="margin-top:auto;padding-top:14px;">Back</button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Exercise</h3>
    <label style="color:var(--muted);font-size:.85em;">Exercise name</label>
    <input id="edit-name" type="text" placeholder="Exercise name">
    <label style="color:var(--muted);font-size:.85em;">Reps / Duration</label>
    <input id="edit-reps" type="text" placeholder="e.g. 15 reps, 400m, 1:00">
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let currentType = '';
let currentWOD = null;
let editIndex = -1;
let timerInterval = null;
let timerSeconds = 0;
let timerPaused = false;
let timerPlan = null;
let timerPhaseIdx = 0;
let timerPhaseRemaining = 0;
let wakeLock = null;
let audioCtx = null;
let currentExIdx = 0;
let currentFocus = null;
let exerciseTimes = []; // { name, reps, startTime, endTime }
let timerStartTime = null;
let lastReport = null;

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Audio (Web Audio API — works on iOS) ──
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, duration, vol) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.frequency.value = freq;
  gain.gain.value = vol || 0.3;
  osc.start(); osc.stop(ctx.currentTime + duration);
}
function shortBeep() { beep(880, 0.12, 0.25); }
function longBeep() { beep(660, 0.5, 0.4); }
function doubleBeep() { beep(880, 0.12, 0.3); setTimeout(() => beep(1100, 0.2, 0.35), 180); }

// ── Wake Lock ──
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}

// ── WOD Database ──
const exercises = {
  cardio: [
    'Box Jumps', 'Double Unders', 'Burpees', 'Rowing (Cal)', 'Assault Bike (Cal)',
    'Running (m)', 'Jump Rope Singles', 'Mountain Climbers', 'High Knees',
    'Shuttle Runs', 'Ski Erg (Cal)', 'Burpee Box Jump Overs', 'Lateral Jumps',
    'Tuck Jumps', 'Bear Crawl (m)'
  ],
  strength: [
    'Back Squat', 'Front Squat', 'Deadlift', 'Bench Press', 'Overhead Press',
    'Power Clean', 'Clean & Jerk', 'Snatch', 'Push Press', 'Sumo Deadlift',
    'Romanian Deadlift', 'Barbell Row', 'Floor Press', 'Thruster',
    'Overhead Squat', 'Hang Clean', 'Push Jerk', 'Strict Press'
  ],
  mixed: [
    'Wall Balls', 'Kettlebell Swings', 'Pull-Ups', 'Push-Ups', 'Thrusters',
    'Toes-to-Bar', 'Dumbbell Snatch', 'Lunges', 'Ring Rows', 'Sit-Ups',
    'Goblet Squats', 'Dumbbell Clean & Jerk', 'Hang Power Clean', 'SDHP',
    'Box Step-Ups', 'Handstand Push-Ups', 'Muscle-Ups', 'Rope Climbs',
    'Pistol Squats', 'Turkish Get-Ups', 'Farmer Carry (m)', 'V-Ups',
    'Plank Hold (sec)', 'Ring Dips', 'Calorie Row', 'Assault Bike (Cal)'
  ]
};

const defaultReps = {
  'Box Jumps':'20','Double Unders':'50','Burpees':'10','Rowing (Cal)':'20',
  'Assault Bike (Cal)':'15','Running (m)':'400','Jump Rope Singles':'100',
  'Mountain Climbers':'30','High Knees':'40','Shuttle Runs':'10',
  'Ski Erg (Cal)':'20','Burpee Box Jump Overs':'8','Lateral Jumps':'20',
  'Tuck Jumps':'15','Bear Crawl (m)':'20',
  'Back Squat':'5','Front Squat':'5','Deadlift':'5','Bench Press':'5',
  'Overhead Press':'5','Power Clean':'3','Clean & Jerk':'2','Snatch':'2',
  'Push Press':'5','Sumo Deadlift':'5','Romanian Deadlift':'8',
  'Barbell Row':'8','Floor Press':'8','Thruster':'5','Overhead Squat':'3',
  'Hang Clean':'3','Push Jerk':'3','Strict Press':'5',
  'Wall Balls':'20','Kettlebell Swings':'15','Pull-Ups':'10','Push-Ups':'15',
  'Thrusters':'12','Toes-to-Bar':'10','Dumbbell Snatch':'10','Lunges':'16',
  'Ring Rows':'12','Sit-Ups':'20','Goblet Squats':'15',
  'Dumbbell Clean & Jerk':'8','Hang Power Clean':'8','SDHP':'12',
  'Box Step-Ups':'16','Handstand Push-Ups':'5','Muscle-Ups':'3',
  'Rope Climbs':'1','Pistol Squats':'8','Turkish Get-Ups':'4',
  'Farmer Carry (m)':'50','V-Ups':'15','Plank Hold (sec)':'45',

function rand(a,b) { return a + Math.floor(Math.random()*(b-a+1)); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickN(type, n) {
  const pool = shuffle(exercises[type]);
  return pool.slice(0, Math.min(n, pool.length));
}

function pickNAll(n) {
  const all = [...exercises.cardio, ...exercises.mixed, ...exercises.strength];
  return shuffle([...new Set(all)]).slice(0, n);
}

function generateWOD(type) {
  currentType = type;
  currentFocus = null;
  const formats = wodFormats[type];
  const fmt = formats[Math.floor(Math.random()*formats.length)];

  const exNames = fmt.pickExercises();
  const mult = fmt.repsMultiplier || 1;
  const exList = exNames.map(name => {
    let reps = fmt.fixedReps || String(Math.round(parseInt(defaultReps[name]||'10') * mult));
    if (fmt.useTabataReps) reps = '20s';
    return { name, reps };
  });

  const minutes = fmt.minutes ? fmt.minutes() : null;
  const rounds = fmt.rounds ? fmt.rounds() : null;
  const totalMin = fmt.timer.rounds ? (typeof fmt.timer.rounds === 'function' ? fmt.timer.rounds() : fmt.timer.rounds) * exList.length : null;

  let descText = typeof fmt.desc === 'function' ? fmt.desc({ minutes, rounds, totalMin }) : fmt.desc;

  currentWOD = {
    type, formatName: fmt.name, description: descText,
    exercises: exList,
    sets: fmt.sets || null,
    timerConfig: { ...fmt.timer },
    minutes, rounds, totalMin
  };

  // Resolve timer config
  if (currentWOD.timerConfig.type === 'amrap') {
    currentWOD.timerConfig.duration = (minutes || 20) * 60;
  }
  if (currentWOD.timerConfig.type === 'emom') {
    currentWOD.timerConfig.totalRounds = totalMin || 12;
  }
  if (currentWOD.timerConfig.type === 'tabata') {
    currentWOD.timerConfig.stations = exList.length;
  }

  renderWOD();
  showScreen('wod');
}

function getExercisePool() {
  return currentFocus ? bodyFocusExercises[currentFocus] : exercises[currentType];

function swapExercise(idx) {
  const pool = getExercisePool();
  const used = new Set(currentWOD.exercises.map(e=>e.name));
  const available = pool.filter(n=>!used.has(n));
  if (!available.length) return;
  const newName = available[Math.floor(Math.random()*available.length)];
  currentWOD.exercises[idx].name = newName;
  currentWOD.exercises[idx].reps = defaultReps[newName] || '10';
  renderWOD();
}

function removeExercise(idx) {
  if (currentWOD.exercises.length <= 1) return;
  currentWOD.exercises.splice(idx, 1);
  renderWOD();
}

function addRandomExercise() {
  const pool = getExercisePool();
  const used = new Set(currentWOD.exercises.map(e=>e.name));
  const available = pool.filter(n=>!used.has(n));
  if (!available.length) return;
  const name = available[Math.floor(Math.random()*available.length)];
  currentWOD.exercises.push({ name, reps: defaultReps[name] || '10' });
  renderWOD();
}

function adjustTimeCap(delta) {
  const tc = currentWOD.timerConfig;
  if (tc.type === 'amrap') {
    const mins = Math.max(5, Math.round(tc.duration / 60) + delta);
    tc.duration = mins * 60;
    currentWOD.description = `AMRAP ${mins} min`;
  } else if (tc.type === 'fortime') {
    tc.cap = Math.max(5, tc.cap + delta);
  }
  renderWOD();
}

function makeDifficulty(dir) {
  // dir: 1 = harder (+25% reps), -1 = easier (-20% reps)
  currentWOD.exercises.forEach(ex => {
    // Try to parse numeric portion
    const match = ex.reps.match(/^(\d+)(.*)/);
    if (match) {
      let num = parseInt(match[1]);
      if (dir > 0) num = Math.ceil(num * 1.25);
      else num = Math.max(1, Math.floor(num * 0.8));
      ex.reps = num + match[2];
    }
  });
  renderWOD();
}

// ── Timer ──
function buildTimerPlan() {
  const cfg = currentWOD.timerConfig;
  const phases = [];
  if (cfg.type === 'amrap') {
    phases.push({ label:'AMRAP', duration: cfg.duration, countdown:true, beepAtEnd:true });
  } else if (cfg.type === 'fortime') {
    phases.push({ label:'GO!', duration: cfg.cap*60, countdown:true, countUp:true, beepAtEnd:true });
  } else if (cfg.type === 'emom') {
    for (let r=0; r<cfg.totalRounds; r++) {
      phases.push({ label:`Min ${r+1} of ${cfg.totalRounds}`, duration:60, countdown:true, beepAtEnd:true, round:r+1, totalRounds:cfg.totalRounds });
    }
  } else if (cfg.type === 'tabata') {
    const stations = cfg.stations || 4;
    for (let s=0; s<stations; s++) {
      for (let r=0; r<8; r++) {
        phases.push({ label:`Station ${s+1}: WORK`, duration:20, countdown:true, beepAtEnd:true, round:r+1, totalRounds:8, isWork:true });
        phases.push({ label:`Station ${s+1}: REST`, duration:10, countdown:true, beepAtEnd:true, round:r+1, totalRounds:8 });
      }
      if (s < stations-1) {
        phases.push({ label:'Switch Station', duration:10, countdown:true, beepAtEnd:true });
      }
    }
  } else if (cfg.type === 'rest') {
    for (let r=0; r<cfg.rounds; r++) {
      phases.push({ label:`Set ${r+1} of ${cfg.rounds} — WORK`, duration:0, countUp:true, manual:true, round:r+1, totalRounds:cfg.rounds });
      if (r < cfg.rounds-1) {
        phases.push({ label:'REST', duration:cfg.rest, countdown:true, beepAtEnd:true, round:r+1, totalRounds:cfg.rounds });
      }
    }
  }
  return phases;
}

function fmtTime(sec) {
  const m = Math.floor(Math.abs(sec)/60);
  const s = Math.abs(sec)%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function startTimer() {
  // Unlock audio on user gesture
  getAudioCtx().resume();
  shortBeep();

  timerPlan = buildTimerPlan();
  if (!timerPlan.length) return;
  timerPhaseIdx = 0;
  timerPaused = false;
  currentExIdx = 0;
  timerStartTime = Date.now();
  exerciseTimes = currentWOD.exercises.map(ex => ({
    name: ex.name, reps: ex.reps, startTime: null, endTime: null
  }));
  if (exerciseTimes.length) exerciseTimes[0].startTime = Date.now();
  lastReport = null;
  requestWakeLock();
  showScreen('timer');
  renderExerciseTracker();
  startPhase();
}

function startPhase() {
  const phase = timerPlan[timerPhaseIdx];
  timerPhaseRemaining = phase.duration;
  timerSeconds = phase.countUp ? 0 : phase.duration;
  renderTimer();
  document.getElementById('timer-toggle').textContent = phase.manual ? 'Next Set' : 'Pause';

  if (phase.manual) {
    // count-up, wait for manual advance
    timerInterval = setInterval(() => {
      if (!timerPaused) { timerSeconds++; renderTimer(); }
    }, 1000);
  } else {
    timerInterval = setInterval(() => {
      if (timerPaused) return;
      timerPhaseRemaining--;
      timerSeconds = phase.countUp ? timerSeconds+1 : timerPhaseRemaining;
      renderTimer();
      // beeps at 3,2,1
      if (timerPhaseRemaining <= 3 && timerPhaseRemaining > 0) shortBeep();
      if (timerPhaseRemaining <= 0) {
        if (phase.beepAtEnd) longBeep();
        clearInterval(timerInterval);
        nextPhase();
      }
    }, 1000);
  }
}

function nextPhase() {
  timerPhaseIdx++;
  if (timerPhaseIdx >= timerPlan.length) {
    doubleBeep(); setTimeout(doubleBeep, 400);
    releaseWakeLock();
    finishAndShowReport();
    return;
  }
  startPhase();
}

function finishAndShowReport() {
  const now = Date.now();
  // Close any open exercise
  if (currentExIdx < exerciseTimes.length && !exerciseTimes[currentExIdx].endTime) {
    exerciseTimes[currentExIdx].endTime = now;
  }
  const totalSec = Math.round((now - timerStartTime) / 1000);
  lastReport = {
    totalSeconds: totalSec,
    exercises: exerciseTimes.map(et => ({
      name: et.name, reps: et.reps,
      seconds: et.startTime && et.endTime ? Math.round((et.endTime - et.startTime) / 1000) : null
    }))
  };
  renderReport();
  showScreen('report');
}

function renderExerciseTracker() {
  const exs = currentWOD.exercises;
  const el = document.getElementById('timer-exercises');
  const controls = document.getElementById('timer-ex-controls');
  if (!exs || !exs.length) { el.innerHTML = ''; controls.style.display = 'none'; return; }
  controls.style.display = 'flex';

  let html = '';
  // Show last completed exercise (struck through)
  if (currentExIdx > 0) {
    const prev = exs[currentExIdx - 1];
    html += `<div class="timer-ex-done">${prev.reps} ${prev.name}</div>`;
  }
  if (currentExIdx < exs.length) {
    // Current exercise
    const cur = exs[currentExIdx];
    html += `<div class="timer-ex-current">${cur.reps} ${cur.name}</div>`;
    // Next up
    if (currentExIdx + 1 < exs.length) {
      const nxt = exs[currentExIdx + 1];
      html += `<div class="timer-ex-next-label">Up next</div>`;
      html += `<div class="timer-ex-next">${nxt.reps} ${nxt.name}</div>`;
    }
  } else {
    html += `<div class="timer-ex-finished">All exercises done!</div>`;
  }
  // Progress
  html += `<div style="color:var(--muted);font-size:0.75em;margin-top:6px;">${Math.min(currentExIdx + 1, exs.length)} / ${exs.length}</div>`;
  el.innerHTML = html;

  // Button states
  document.getElementById('ex-prev-btn').disabled = currentExIdx <= 0;
  document.getElementById('ex-prev-btn').style.opacity = currentExIdx <= 0 ? '0.3' : '1';
  document.getElementById('ex-next-btn').textContent = currentExIdx >= exs.length - 1 ? 'Done' : 'Next';
}

function nextExercise() {
  shortBeep();
  const now = Date.now();
  // Mark current as done
  if (currentExIdx < exerciseTimes.length) {
    exerciseTimes[currentExIdx].endTime = now;
  }
  if (currentExIdx < currentWOD.exercises.length) currentExIdx++;
  // Start next
  if (currentExIdx < exerciseTimes.length && !exerciseTimes[currentExIdx].startTime) {
    exerciseTimes[currentExIdx].startTime = now;
  }
  renderExerciseTracker();
}

function prevExercise() {
  if (currentExIdx > 0) {
    // Reset current start, reopen previous
    if (currentExIdx < exerciseTimes.length) exerciseTimes[currentExIdx].startTime = null;
    currentExIdx--;
    exerciseTimes[currentExIdx].endTime = null;
    exerciseTimes[currentExIdx].startTime = Date.now();
  }
  renderExerciseTracker();
}

function renderTimer() {
  document.getElementById('timer-display').textContent = fmtTime(timerSeconds);
  const phase = timerPlan[timerPhaseIdx];
  document.getElementById('timer-phase').textContent = phase.label;
  document.getElementById('timer-round').textContent =
    phase.round ? `Round ${phase.round}/${phase.totalRounds}` : '';
}

function toggleTimer() {
  const phase = timerPlan[timerPhaseIdx];
  if (phase && phase.manual) {
    // manual mode: "Next Set" advances
    clearInterval(timerInterval);
    longBeep();
    nextPhase();
    return;
  }
  timerPaused = !timerPaused;
  document.getElementById('timer-toggle').textContent = timerPaused ? 'Resume' : 'Pause';
}

function stopTimer() {
  clearInterval(timerInterval);
  releaseWakeLock();
  finishAndShowReport();
}

// ── Report ──
function renderReport() {
  if (!lastReport) return;
  document.getElementById('report-total').textContent = 'Total: ' + fmtTime(lastReport.totalSeconds);
  const maxSec = Math.max(...lastReport.exercises.map(e => e.seconds || 0), 1);
  let html = '';
  lastReport.exercises.forEach(ex => {
    const sec = ex.seconds;
    const pct = sec ? Math.round((sec / maxSec) * 100) : 0;
    html += `<div class="report-row">
      <div class="report-ex">${ex.reps} ${ex.name}
        <div class="report-bar-bg"><div class="report-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="report-time">${sec !== null ? fmtTime(sec) : '--'}</div>
    </div>`;
  });
  document.getElementById('report-card').innerHTML = html;
}

function logWorkoutWithReport() {
  const h = getHistory();
  h.unshift({
    date: new Date().toISOString(),
    wod: JSON.parse(JSON.stringify(currentWOD)),
    report: lastReport ? JSON.parse(JSON.stringify(lastReport)) : null
  });
  if (h.length > 100) h.length = 100;
  saveHistory(h);
  alert('Workout logged!');
  showScreen('home');
}

// ── History (localStorage) ──
function getHistory() {
  try { return JSON.parse(localStorage.getItem('wod_history') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('wod_history', JSON.stringify(h)); }

function logWorkout() {
  const h = getHistory();
  h.unshift({
    date: new Date().toISOString(),
    wod: JSON.parse(JSON.stringify(currentWOD))
  });
  // Keep last 100
  if (h.length > 100) h.length = 100;
  saveHistory(h);
  alert('Workout logged!');
}

function showHistory() {
  const h = getHistory();
  const list = document.getElementById('history-list');
  if (!h.length) {
    list.innerHTML = '<div class="history-empty">No workouts logged yet.<br>Complete a workout to see it here.</div>';
    showScreen('history');
    return;
  }
  list.innerHTML = h.map((entry, i) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
    const exSummary = entry.wod.exercises.map(e => `${e.reps} ${e.name}`).join(' | ');
    const rpt = entry.report;
    const totalStr = rpt ? ` &mdash; ${fmtTime(rpt.totalSeconds)}` : '';
    let reportHtml = '';
    if (rpt && rpt.exercises) {
      const lines = rpt.exercises.map(e =>
        `${e.reps} ${e.name}: ${e.seconds !== null ? fmtTime(e.seconds) : '--'}`
      ).join('<br>');
      reportHtml = `<button class="history-report-toggle" onclick="event.stopPropagation();this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">Report</button>
        <div class="history-report" style="display:none">${lines}</div>`;
    }
    return `<div class="history-item" style="margin-bottom:10px;">
      <button class="history-delete" onclick="event.stopPropagation();deleteHistoryWOD(${i})" title="Delete">&#10005;</button>
      <div onclick="loadHistoryWOD(${i})">
        <div class="history-date">${dateStr}${totalStr}</div>
        <div class="history-wod-name">${entry.wod.formatName}</div>
        <div class="history-type">${entry.wod.type}</div>
        <div class="history-exercises">${exSummary}</div>
        ${reportHtml}
      </div>
    </div>`;
  }).join('');
  showScreen('history');
}

function deleteHistoryWOD(idx) {
  const h = getHistory();
  h.splice(idx, 1);
  saveHistory(h);
  showHistory();
}

function loadHistoryWOD(idx) {
  const h = getHistory();
  currentWOD = JSON.parse(JSON.stringify(h[idx].wod));
  currentType = currentWOD.type;
  renderWOD();
  showScreen('wod');
}

// ── PWA Registration ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
